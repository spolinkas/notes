<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Notes API</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 700px;
            margin: 40px auto;
            background: #f4f6f8;
            color: #222;
        }

        h1 {
            text-align: center;
        }

        .form {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        input, textarea, button {
            width: 100%;
            box-sizing: border-box;
            margin-top: 10px;
            padding: 10px;
            font-size: 16px;
        }

        button {
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        .note {
            background: white;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .note h3 {
            margin-top: 0;
        }

        .delete-btn {
            background: #dc2626;
            margin-top: 10px;
        }

        .delete-btn:hover {
            background: #b91c1c;
        }
    </style>
</head>
<body>

<h1>Notes</h1>

<div class="form">
    <h2>Создать заметку</h2>

    <input id="title" type="text" placeholder="Название заметки">
    <textarea id="content" placeholder="Текст заметки"></textarea>

    <button onclick="createNote()">Создать</button>
</div>

<h2>Список заметок</h2>
<div id="notes"></div>

<script>
    async function loadNotes() {
        const response = await fetch("/notes");
        const notes = await response.json();

        const notesDiv = document.getElementById("notes");
        notesDiv.innerHTML = "";

        notes.forEach(note => {
            const div = document.createElement("div");
            div.className = "note";

            div.innerHTML = `
                <h3>${note.title}</h3>
                <p>${note.content}</p>
                <small>ID: ${note.id}</small>
                <button class="delete-btn" onclick="deleteNote(${note.id})">
                    Удалить
                </button>
            `;

            notesDiv.appendChild(div);
        });
    }

    async function createNote() {
        const title = document.getElementById("title").value;
        const content = document.getElementById("content").value;

        if (!title || !content) {
            alert("Заполни название и текст заметки");
            return;
        }

        await fetch("/notes", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                title: title,
                content: content
            })
        });

        document.getElementById("title").value = "";
        document.getElementById("content").value = "";

        loadNotes();
    }

    async function deleteNote(id) {
        await fetch(`/notes/${id}`, {
            method: "DELETE"
        });

        loadNotes();
    }

    loadNotes();
</script>

</body>
</html>
